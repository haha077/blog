    <p>如果提示访问被拒绝</p>
<p>sudo nano /etc/ssh/sshd_config</p>
<p>确保以下几项</p>
<p>PubkeyAuthentication yes   # 允许公钥认证（默认开启）
PasswordAuthentication yes  # 允许密码登录（必须设为 yes）
ChallengeResponseAuthentication yes  # 允许交互式认证（可选）</p>
